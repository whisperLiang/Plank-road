[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = [
  "ignore:`torch.jit.script` is deprecated.*:DeprecationWarning:torch.jit._script",
  "ignore:rfdetr\\.util\\..* is deprecated.*:DeprecationWarning",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  ".venv",
  "__pycache__",
  "grpc_server/message_transmission_pb2.py",
  "grpc_server/message_transmission_pb2_grpc.py",
  "grpc_server/protos/message_transmission_pb2.py",
  "grpc_server/protos/message_transmission_pb2_grpc.py",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E402"]
