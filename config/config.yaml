client:
 # the source video
 source:
  video_path: ./video_data/road.mp4
  max_count: 1000
  rtsp:
   flag: False
   account: your account
   password: your password
   ip_address: you camera ip
   channel: 1
 # the frame interval
 interval: 1
 # the difference feature (pixel, edge, area, corner).
 feature: edge
 # the difference flag and thresh
 diff_flag: True
 diff_thresh: 0.0004
 # the queue maxsize
 local_queue_maxsize: 10
 # the max wait time
 wait_thresh: 100
 frame_cache_maxsize: 100
 lightweight: rfdetr_nano
 # edge-side final display threshold; boxes below this score are not returned
 final_detection_threshold: 0.6
 # Supported model names (see model_management/model_zoo.py):
 #   RetinaNet:    retinanet_resnet50_fpn
 #   FCOS:         fcos_resnet50_fpn
 #   YOLOv5:       yolov5n, yolov5s, yolov5m, yolov5l, yolov5x
 #   YOLOv8:       yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
 #   YOLOv10:      yolov10n, yolov10s, yolov10m, yolov10l, yolov10x
 #   YOLO11:       yolo11n, yolo11s, yolo11m, yolo11l, yolo11x
 #   YOLO12:       yolo12n, yolo12s, yolo12m, yolo12l, yolo12x
 #   YOLO26:       yolo26n, yolo26s, yolo26m, yolo26l, yolo26x
 #   DETR:         detr_resnet50, detr_resnet101, conditional_detr_resnet50
 #   RF-DETR:      rfdetr_nano, rfdetr_small, rfdetr_medium, rfdetr_large
 #   RT-DETR:      rtdetr_l, rtdetr_x
 #   TinyNeXt:     tinynext_s, tinynext_m
 # server_ip
 server_ip: '192.168.66.205:50051'
 # edge nodes
 edge_id: 1
 edge_num: 1
 # retrain
 retrain:
  flag: True
  # Grace window for async cloud job status polling. A submitted job can be
  # briefly invisible if the cloud endpoint reconnects or routes to a different
  # worker; the edge keeps polling within this window before treating it as lost.
  status_not_found_grace_sec: 60
  cache_path: './cache'
  collect_num: 8
  # JPEG quality for raw CL samples. Lowering quality reduces upload bytes
  # without changing resolution.
  raw_jpeg_quality: 82
 # drift detection
 drift_detection:
  # Fallback confidence threshold for edge-side sample bucketing when full quality signals are unavailable
  confidence_threshold: 0.8
  # Token budget for adaptive drift triggering; lower is more conservative, higher allows more frequent triggers
  pi_bar: 0.1

  # -------------------------
  # Frequently tuned parameters
  # -------------------------
  # Warmup frames before relative-drift detection becomes active; shorten for very short clips
  adaptive_warmup_steps: 30
  # Relative-drift anomaly threshold; lower is more sensitive, higher is more conservative
  adaptive_anomaly_threshold: 0.35
  # Number of consecutive anomalous frames required for relative-drift; larger values are more noise-tolerant
  adaptive_persistence: 3
  # Blind-spot score threshold; lower values make persistent misses easier to classify as blind spots
  adaptive_blind_spot_score_threshold: 0.6
  # Number of consecutive blind-spot frames required before drift is triggered
  adaptive_blind_spot_persistence: 4
  # Low-quality threshold for per-frame quality_score; higher values label more frames as low_quality
  adaptive_quality_low_threshold: 0.50
  # Sliding-window size used by low-quality accumulation drift
  adaptive_low_quality_window: 20
  # Number of low-quality samples inside the window required to declare drift
  adaptive_low_quality_trigger_count: 8

  # -------------------------
  # Usually keep at defaults: internal scaling parameters
  # -------------------------
  # EMA smoothing factor controlling how quickly historical baselines adapt
  adaptive_ema_alpha: 0.05
  # Proposal-count lower bound for considering a frame "proposal rich" in blind-spot scoring
  adaptive_blind_spot_min_proposals: 32
  # Reference upper bound for retained/proposal ratio; lower ratios look more like persistent misses
  adaptive_blind_spot_max_retained_ratio: 0.08
  # Denominator for the low-confidence pressure term inside blind-spot scoring
  adaptive_blind_spot_confidence_ceiling: 0.45
  # Normalization scale for feature spectral-entropy shifts used in representation-shift anomaly scoring
  adaptive_feature_entropy_scale: 0.2
  # Normalization scale for logit-entropy increases; smaller values amplify uncertainty rises
  adaptive_logit_entropy_scale: 0.2
  # Normalization scale for logit-energy drops across frames
  adaptive_logit_energy_scale: 2.0
  # Minimum reference value for logit margin to avoid unstable ratio-drop amplification near zero
  adaptive_quality_margin_floor: 0.10
  # Tolerance band for logit entropy; small variations within this range are not treated as meaningful degradation
  adaptive_quality_entropy_tolerance: 0.08
  # Minimum number of quality samples required before percentile-based low-quality checks are enabled
  adaptive_quality_min_history: 20
  # Minimum drop below the sample-quality EMA before the current frame is considered meaningfully worse than baseline
  adaptive_quality_relative_low_delta: 0.02
  # Saturation ceiling for retained_count in over-detection scoring; penalties stop increasing beyond this value
  adaptive_over_detection_retained_ceiling: 32

 # Resource-aware CL trigger (two-queue Lyapunov scheduler)
 # Reference: RCCDA (NeurIPS 2025) — Lyapunov drift-plus-penalty
 # https://github.com/Adampi210/RCCDA_resource_constrained_concept_drift_adaptation_code
 #
 # When enabled, *replaces* the drift_detection trigger with a two-queue
 # Lyapunov policy that jointly decides (1) whether to trigger CL and
 # (2) whether low-confidence samples should also upload features, considering:
 #   - Cloud resource state (CPU / GPU / memory utilisation)
 #   - Network bandwidth to the cloud
 #   - Edge-side confidence-score degradation
 #
 # Virtual queues:
 #   Q_cloud  — bounds average cloud cost    ≤  lambda_cloud
 #   Q_bw     — bounds average bandwidth     ≤  lambda_bw
 resource_aware_trigger:
  enabled: True
  # --- Shared with drift_detection (PD urgency controller) ---
  # Conservative profile: delay CL until enough evidence accumulates and let
  # the Q_cloud/Q_bw penalties suppress repeated training decisions.
  V: 10.0                # skip-training penalty multiplier; lower is more conservative in the current min-cost implementation
  K_p: 0.6              # PD proportional gain
  K_d: 0.2              # PD derivative gain
  # confidence_threshold: 0.8
  # --- Two-queue budget constraints ---
  lambda_cloud: 0.5     # avg cloud-cost budget per round [0,1]
  lambda_bw: 0.5        # avg bandwidth budget per round [0,1]
  # --- Queue importance weights ---
  w_cloud: 1.0           # weight for cloud-cost queue
  w_bw: 1.0              # weight for bandwidth queue
  min_training_samples: 80
  drift_bonus: 0.20
  upload_time_budget_sec: 5.0
  # CL bundle byte budget. With a bandwidth estimate, the edge caps the
  # bundle at min(max_bytes, max(min_bytes, mbps * target_sec / 8 * 1e6)).
  bundle_max_bytes: 33554432
  bundle_min_bytes: 8388608
  bundle_target_upload_sec: 45.0
 # Split learning for continual learning 
 # When enabled, backbone features are extracted and cached on the edge.
 # Only drift-moment samples are annotated by the cloud's large model;
 # non-drift samples use edge pseudo-labels for training.
 # The cloud trains only the server-side layers (rpn + roi_heads)
 # on the intermediate features, reducing annotation cost.
 split_learning:
  enabled: True
  fixed_split:
   privacy_leakage_upper_bound: 0.15
   max_layer_freezing_ratio: 0.75
   validate_candidates: True
   max_candidates: 24
   max_boundary_count: 8
   max_payload_bytes: 33554432
   privacy_leakage_epsilon: 1.0e-12

server:
 server_id: 0
 golden: rtdetr_x
 # lightweight model used to generate fine-tuned weights for the edge
 edge_model_name: rfdetr_nano
 # gRPC listen address for the cloud server
 listen_address: "[::]:50051"
 # Number of gRPC worker threads; should be > max_concurrent_jobs to avoid
 # status queries being blocked by training submissions
 grpc_max_workers: 16
 # cloud-owned workspace used for uploaded retraining bundles
 workspace_root: "./cache/server_workspace"
 #the queue maxsize
 local_queue_maxsize: 10
 # the max wait time
 wait_thresh: 10
 # continual learning settings
 continual_learning:
  num_epoch: 50
  # Cloud traces the fixed split runtime with a small batch to build a
  # dynamic-batch Ariadne template; reconstruction/training use batch_size.
  trace_batch_size: 2
  batch_size: 16
  teacher_batch_size: 32
  proxy_eval_interval_rounds: 5
  proxy_eval_patience: 3
  proxy_eval_min_delta: 0.0005
  # RF-DETR fixed-split jobs shrink the effective runtime batch size toward
  # this many optimizer steps per outer round so small bundles do not collapse
  # into a single heavily padded update.
  rfdetr_fixed_split_target_steps_per_round: 4
  max_concurrent_jobs: 4
  # Cloud-side teacher threshold used only for GT annotation during
  # continual learning. Lower values recover more small/far objects but
  # may introduce noisier pseudo-GT.
  teacher_annotation_threshold: 0.5
 # Dynamic Activation Sparsity (SURGEON-style layer pruning)
 # Reference: SURGEON (CVPR 2025)
 # https://github.com/kadmkbl/SURGEON
 #
 # When enabled, Conv/BN/FC layers in the **tail partition** (rpn +
 # roi_heads) are replaced with AutoFreeze versions that dynamically
 # prune activations stored for the backward pass.
 #
 # Per-layer pruning ratios are computed via TGI (Total Gradient
 # Importance = gradient_norm / sqrt(numel) × log(M_total / M_layer)).
 # Layers with higher TGI keep more activations.
 das:
  enabled: False
  # bn_only: True → only BN parameters are updated; Conv/FC weight
  #   gradients are blocked.  Useful for conservative adaptation.
  bn_only: False
  # DAS strategy:
  #   tgi     -> probe gradients and compute TGI-based pruning ratios
  #   entropy -> use per-layer feature spectral entropy online without probing
  strategy: entropy
  # Number of samples used for gradient-importance probing each epoch.
  # Ignored when strategy=entropy.
  probe_samples: 10
