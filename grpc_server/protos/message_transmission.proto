syntax = "proto3";

service MessageTransmission {
  rpc task_processor (MessageRequest) returns (MessageReply) {}
  rpc get_queue_info (InfoRequest) returns (InfoReply) {}
  rpc frame_processor (stream FrameRequest) returns (FrameReply) {}
  // Cloud-side continual learning: edge sends collected frame indices,
  // cloud retrains the lightweight model and returns updated weights.
  rpc train_model_request (TrainRequest) returns (TrainReply) {}
  // Split-learning continual learning: edge sends intermediate features
  // (cached on shared filesystem), cloud annotates drift frames only,
  // then trains server-side model (rpn + roi_heads) on all features.
  rpc split_train_request (SplitTrainRequest) returns (SplitTrainReply) {}
  // Resource-aware CL trigger: edge queries cloud resource utilisation.
  rpc query_resource (ResourceRequest) returns (ResourceReply) {}
  // Bandwidth estimation: edge sends a small payload, cloud echoes it.
  rpc bandwidth_probe (BandwidthProbeRequest) returns (BandwidthProbeReply) {}
}

message MessageRequest {
  int64 source_edge_id = 1;
  int64 frame_index = 2;
  string start_time = 3;
  string frame = 4;
  string part_result = 5;
  string raw_shape = 6;
  string new_shape = 7;
  string ref_list = 8;
  string note = 9;
}

message MessageReply {
  int64 destination_id = 1;
  int64 local_length = 2;
  string response = 3;
}


message FrameRequest{
    string frame = 1;
    string frame_shape = 2;
    int64 frame_index = 3;
}

message FrameReply{
    string response = 1;
    string frame_shape = 2;
}


message InfoRequest {
  int64 source_edge_id = 1;
  int64 local_length = 2;
}

message InfoReply {
  int64 destination_id = 1;
  int64 local_length = 2;
}

// Continual learning messages
message TrainRequest {
  int64 edge_id = 1;
  // JSON-serialised list of integer frame indices to use for retraining
  string frame_indices = 2;
  // Absolute path (on cloud) of the frame cache directory
  string cache_path = 3;
  // Number of training epochs (0 = use cloud default)
  int64 num_epoch = 4;
}

message TrainReply {
  bool success = 1;
  // Base-64 encoded PyTorch state-dict bytes of the retrained lightweight model
  string model_data = 2;
  string message = 3;
}

// Split-learning continual learning messages 
message SplitTrainRequest {
  int64 edge_id = 1;
  // JSON list of ALL frame indices (features cached on shared filesystem)
  string all_frame_indices = 2;
  // JSON list of drift frame indices (subset) for ground-truth annotation
  string drift_frame_indices = 3;
  // Absolute path to cache directory (contains features/ and frames/ dirs)
  string cache_path = 4;
  // Number of training epochs (0 = use cloud default)
  int64 num_epoch = 5;
}

message SplitTrainReply {
  bool success = 1;
  // Base-64 encoded PyTorch state-dict bytes of the retrained model
  string model_data = 2;
  string message = 3;
}

// Resource-aware CL trigger: cloud resource query
message ResourceRequest {
  int64 edge_id = 1;
}

message ResourceReply {
  double cpu_utilization = 1;      // [0.0, 1.0]
  double gpu_utilization = 2;      // [0.0, 1.0]
  double memory_utilization = 3;   // [0.0, 1.0]
  int64 train_queue_size = 4;      // current training queue depth
  int64 max_queue_size = 5;        // max training queue capacity
}

// Bandwidth probe: edge sends payload, cloud echoes back
message BandwidthProbeRequest {
  string payload = 1;
}

message BandwidthProbeReply {
  string payload = 1;
}